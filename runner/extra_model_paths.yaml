# Maps ComfyUI's model folders onto the per-job /input mount (read-only).
# Models are never baked into the image — they are staged on ShareSync and
# arrive under /input/models/ when the job starts.
spark_fuse:
  base_path: /input/models
  checkpoints: checkpoints
  diffusion_models: diffusion_models
  unet: unet
  text_encoders: text_encoders
  clip: clip
  clip_vision: clip_vision
  vae: vae
  loras: loras
  controlnet: controlnet
  upscale_models: upscale_models
  embeddings: embeddings
  configs: configs
